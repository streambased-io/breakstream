services:
  ksi:
    environment:
      - KSI_RECORD_CACHE_ENABLED=${KSI_RECORD_CACHE_ENABLED:-true}
      - KSI_RECORD_CACHE_MAX_BYTES=${KSI_RECORD_CACHE_MAX_BYTES:-536870912}
      - KSI_PREFETCH_ENABLED=${KSI_PREFETCH_ENABLED:-true}
      - KSI_PREFETCH_BATCH_COUNT=${KSI_PREFETCH_BATCH_COUNT:-5}
      - KSI_PREFETCH_TRIGGER_THRESHOLD=${KSI_PREFETCH_TRIGGER_THRESHOLD:-2}
